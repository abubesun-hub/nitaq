<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#eef6f3" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#eaf6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#g1)" />

  <!-- soft large shapes -->
  <g opacity="0.7" filter="url(#blur)">
    <ellipse cx="1280" cy="140" rx="420" ry="180" fill="#ffdca8" />
    <ellipse cx="220" cy="180" rx="360" ry="150" fill="#d7ecff" />
    <ellipse cx="800" cy="700" rx="520" ry="200" fill="#e6f8ef" />
  </g>

  <!-- abstract POS / receipt / cart icons as outlines -->
  <g fill="none" stroke="#0e2549" stroke-opacity="0.08" stroke-width="8" transform="translate(120,120)">
    <!-- shopping cart -->
    <path d="M40 380h420l60-240H140" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="420" r="28" />
    <circle cx="420" cy="420" r="28" />
    <!-- receipt -->
    <rect x="860" y="120" width="160" height="260" rx="12"/>
    <path d="M860 160h160" />
    <path d="M860 200h160" />
    <!-- POS terminal -->
    <rect x="1160" y="260" width="220" height="140" rx="16"/>
    <rect x="1190" y="300" width="160" height="80" rx="8"/>
    <!-- barcode strip -->
    <g transform="translate(520,320)">
      <rect x="0" y="0" width="260" height="120" rx="10"/>
      <g stroke="#0e2549" stroke-width="8" stroke-linecap="square" stroke-opacity="0.08">
        <path d="M18 18v84" />
        <path d="M38 18v84" />
        <path d="M62 18v84" />
        <path d="M86 18v84" />
        <path d="M110 18v84" />
        <path d="M138 18v84" />
        <path d="M174 18v84" />
      </g>
    </g>
  </g>

  <!-- subtle pattern textures -->
  <g opacity="0.06" fill="#0e2549">
    <circle cx="140" cy="820" r="6" />
    <circle cx="160" cy="820" r="6" />
    <circle cx="180" cy="820" r="6" />
    <circle cx="200" cy="820" r="6" />
  </g>

  <!-- central faded vignette to guide eyes -->
  <rect width="100%" height="100%" fill="url(#g2)" opacity="0.5"/>
</svg>
